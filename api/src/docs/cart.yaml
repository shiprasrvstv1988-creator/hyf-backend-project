tags:
  - name: Cart
    description: Shopping cart management for guests and members
  - name: Orders
    description: Order history and detailed receipts

paths:
  /api/cart:
    get:
      summary: Get the current cart
      tags: [Cart]
      parameters:
        - in: header
          name: x-guest-id
          schema:
            type: string
          required: false
          description: Unique ID for guest users
      responses:
        200:
          description: Success

  /api/cart/items:
    post:
      summary: Add an item to the cart
      tags: [Cart]
      parameters:
        - in: header
          name: x-guest-id
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event_id]
              properties:
                event_id:
                  type: integer
                quantity:
                  type: integer
                  minimum: 1
                  default: 1
      responses:
        201:
          description: Created

  /api/cart/items/{itemId}:
    put:
      summary: Update item quantity
      tags: [Cart]
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: integer
        - in: header
          name: x-guest-id
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  type: integer
                  minimum: 1
      responses:
        200:
          description: Updated
    delete:
      summary: Remove item from cart
      tags: [Cart]
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: integer
        - in: header
          name: x-guest-id
          schema:
            type: string
      responses:
        204:
          description: No Content
  /api/cart/checkout:
    post:
      summary: Checkout the current cart
      description: Converts the cart into a completed order and clears the cart.
      tags: [Cart]
      parameters:
        - in: header
          name: x-guest-id
          schema:
            type: string
          description: Unique ID for guest checkout (if not logged in)
      responses:
        201:
          description: Checkout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Checkout successful"
                  orderId:
                    type: integer
                    example: 8
                  total:
                    type: number
                    example: 45.50

  /api/orders:
    get:
      summary: Retrieve order history
      tags: [Orders]
      responses:
        200:
          description: A list of orders for the logged-in user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        user_id: { type: integer }
                        total_price: { type: string }
                        status: { type: string }
                        created_at: { type: string, format: date-time }

  /api/orders/{orderId}:
    get:
      summary: Get detailed receipt for a specific order
      tags: [Orders]
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Detailed order info including items
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id: { type: integer }
                      total_price: { type: string }
                      status: { type: string }
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: integer }
                            title: { type: string }
                            quantity: { type: integer }
                            unit_price: { type: string }
        404:
          description: Order not found
